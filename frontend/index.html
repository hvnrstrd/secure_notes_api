<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Secure Notes</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f5;
      color: #1a1a1a;
      min-height: 100vh;
    }

    .container { max-width: 640px; margin: 0 auto; padding: 2rem 1rem; }

    h1 { font-size: 1.5rem; font-weight: 600; margin-bottom: 2rem; }

    .card {
      background: white;
      border-radius: 12px;
      border: 1px solid #e5e5e5;
      padding: 1.5rem;
      margin-bottom: 1rem;
    }

    input, textarea {
      width: 100%;
      padding: 0.75rem;
      border: 1px solid #e5e5e5;
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      margin-bottom: 0.75rem;
      outline: none;
    }

    input:focus, textarea:focus { border-color: #333; }

    textarea { height: 100px; resize: vertical; }

    button {
      padding: 0.6rem 1.2rem;
      border-radius: 8px;
      border: 1px solid #e5e5e5;
      font-size: 14px;
      font-family: inherit;
      cursor: pointer;
      background: white;
    }

    button.primary { background: #1a1a1a; color: white; border-color: #1a1a1a; }
    button.danger { color: #c0392b; }
    button:hover { opacity: 0.85; }

    .note {
      background: white;
      border-radius: 12px;
      border: 1px solid #e5e5e5;
      padding: 1.2rem 1.5rem;
      margin-bottom: 0.75rem;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 1rem;
    }

    .note-title { font-weight: 500; font-size: 15px; margin-bottom: 4px; }
    .note-body { font-size: 13px; color: #666; }
    .note-date { font-size: 11px; color: #999; margin-top: 6px; }

    .tabs { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; }

    .error { color: #c0392b; font-size: 13px; margin-top: 0.5rem; }
    .empty { color: #999; font-size: 14px; text-align: center; padding: 2rem; }

    #notes-section { display: none; }
    #auth-section { display: block; }
  </style>
</head>
<body>
<div class="container">

  <div id="auth-section">
    <h1>Secure Notes</h1>
    <div class="card">
      <div class="tabs">
        <button class="primary" id="tab-login" onclick="showTab('login')">Login</button>
        <button id="tab-register" onclick="showTab('register')">Register</button>
      </div>

      <div id="form-login">
        <input type="email" id="login-email" placeholder="Email">
        <input type="password" id="login-password" placeholder="Password">
        <button class="primary" onclick="login()">Login</button>
        <div class="error" id="login-error"></div>
      </div>

      <div id="form-register" style="display:none">
        <input type="email" id="reg-email" placeholder="Email">
        <input type="password" id="reg-password" placeholder="Password">
        <button class="primary" onclick="register()">Register</button>
        <div class="error" id="reg-error"></div>
      </div>
    </div>
  </div>

  <div id="notes-section">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1.5rem;">
      <h1>My Notes</h1>
      <button onclick="logout()">Logout</button>
    </div>

    <div class="card">
      <input type="text" id="note-title" placeholder="Title">
      <textarea id="note-body" placeholder="Write your note..."></textarea>
      <button class="primary" onclick="createNote()">Add note</button>
    </div>

    <div id="notes-list"></div>
  </div>

</div>

<script>
  const API = 'http://localhost:8080'
  let token = localStorage.getItem('token')

  if (token) showNotes()

  function showTab(tab) {
    document.getElementById('form-login').style.display = tab === 'login' ? 'block' : 'none'
    document.getElementById('form-register').style.display = tab === 'register' ? 'block' : 'none'
    document.getElementById('tab-login').className = tab === 'login' ? 'primary' : ''
    document.getElementById('tab-register').className = tab === 'register' ? 'primary' : ''
  }

  async function login() {
    const email = document.getElementById('login-email').value
    const password = document.getElementById('login-password').value
    const res = await fetch(`${API}/auth/login`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({email, password})
    })
    const data = await res.json()
    if (!res.ok) {
      document.getElementById('login-error').textContent = data.error
      return
    }
    token = data.token
    localStorage.setItem('token', token)
    showNotes()
  }

  async function register() {
    const email = document.getElementById('reg-email').value
    const password = document.getElementById('reg-password').value
    const res = await fetch(`${API}/auth/register`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({email, password})
    })
    const data = await res.json()
    if (!res.ok) {
      document.getElementById('reg-error').textContent = data.error
      return
    }
    showTab('login')
    document.getElementById('login-email').value = email
  }

  function logout() {
    token = null
    localStorage.removeItem('token')
    document.getElementById('auth-section').style.display = 'block'
    document.getElementById('notes-section').style.display = 'none'
  }

  async function showNotes() {
    document.getElementById('auth-section').style.display = 'none'
    document.getElementById('notes-section').style.display = 'block'
    await loadNotes()
  }

  async function loadNotes() {
    const res = await fetch(`${API}/notes`, {
      headers: {'Authorization': `Bearer ${token}`}
    })
    if (res.status === 401) { logout(); return }
    const notes = await res.json()
    const list = document.getElementById('notes-list')
    if (!notes || notes.length === 0) {
      list.innerHTML = '<div class="empty">No notes yet</div>'
      return
    }
    list.innerHTML = notes.map(n => `
      <div class="note">
        <div>
          <div class="note-title">${escape(n.title)}</div>
          <div class="note-body">${escape(n.body)}</div>
          <div class="note-date">${new Date(n.created_at).toLocaleString()}</div>
        </div>
        <button class="danger" onclick="deleteNote('${n.id}')">Delete</button>
      </div>
    `).join('')
  }

  async function createNote() {
    const title = document.getElementById('note-title').value
    const body = document.getElementById('note-body').value
    if (!title) return
    await fetch(`${API}/notes`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${token}`
      },
      body: JSON.stringify({title, body})
    })
    document.getElementById('note-title').value = ''
    document.getElementById('note-body').value = ''
    await loadNotes()
  }

  async function deleteNote(id) {
    await fetch(`${API}/notes/${id}`, {
      method: 'DELETE',
      headers: {'Authorization': `Bearer ${token}`}
    })
    await loadNotes()
  }

  function escape(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
  }
</script>
</body>
</html>
